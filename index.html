<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações de Perfil - Cyber Arcade</title>
    <style>
        /* ==========================================================================
           RESET & VARIÁVEIS CYBERPUNK
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0c0c12;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            user-select: none;
        }

        /* ==========================================================================
           CARD PRINCIPAL RESPONSIVO
           ========================================================================== */
        .account-card {
            background-color: #14141d;
            padding: 2.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.6), 0 0 25px rgba(130, 87, 229, 0.15);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(130, 87, 229, 0.2);
        }

        /* Container do Avatar e Upload */
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 1rem;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.25);
            background: #0c0c12;
            transition: all 0.3s ease;
        }

        input[type="file"] {
            display: none;
        }

        .btn-upload {
            display: inline-block;
            padding: 5px 12px;
            background-color: #0c0c12;
            color: #a8a8b3;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-upload:hover {
            background-color: #8257e5;
            color: #fff;
            border-color: #9466ff;
            box-shadow: 0 0 10px rgba(130, 87, 229, 0.4);
        }

        /* Textos de Identidade */
        h2 {
            margin: 0 0 4px 0;
            color: #fff;
            font-weight: 900;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 1.4rem;
        }

        .username-display {
            font-size: 1.2rem;
            color: #00ffcc;
            font-weight: bold;
            margin-bottom: 1.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.2);
        }

        /* ==========================================================================
           STATUS DO JOGADOR COMPATÍVEL COM O HUB
           ========================================================================== */
        .player-hub-stats {
            display: flex;
            justify-content: space-around;
            background: #0c0c12;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 1.5rem;
        }

        .stat-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #7c7c8a;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .stat-val {
            font-size: 0.9rem;
            font-weight: 800;
        }
        .stat-val.bits { color: #ffcc00; }
        .stat-val.rank { color: #9466ff; }

        /* ==========================================================================
           FORMULÁRIOS E SELETORES
           ========================================================================== */
        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #a8a8b3;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"], .select-custom {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: #0c0c12;
            color: #fff;
            box-sizing: border-box;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        input[type="text"]:focus, .select-custom:focus {
            outline: none;
            border-color: #8257e5;
            box-shadow: 0 0 10px rgba(130, 87, 229, 0.2);
        }

        /* ==========================================================================
           AÇÃO E BOTÕES
           ========================================================================== */
        .btn-save {
            width: 100%;
            padding: 14px;
            background-color: #00ffcc;
            color: #0c0c12;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2);
        }

        .btn-save:hover {
            background-color: #61ffdf;
            box-shadow: 0 4px 25px rgba(0, 255, 204, 0.4);
            transform: translateY(-1px);
        }

        .btn-clear {
            background: transparent;
            color: #ff4b4b;
            border: none;
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 18px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .btn-clear:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="account-card">
        <!-- Bloco de Imagem -->
        <div class="avatar-container">
            <img id="avatarPreview" class="avatar-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Avatar do Usuário">
        </div>
        <label for="avatarInput" class="btn-upload">Alterar Foto</label>
        <input type="file" id="avatarInput" accept="image/*">

        <!-- Identidade -->
        <h2 id="welcomeTitle">Painel de Acesso</h2>
        <div id="userDisplay" class="username-display">Jogador_Novo</div>

        <!-- Indicadores de Recursos Sincronizados -->
        <div class="player-hub-stats">
            <div class="stat-block">
                <span class="stat-label">Saldo Bits</span>
                <span id="hubBits" class="stat-val bits">0 BT</span>
            </div>
            <div class="stat-block">
                <span class="stat-label">Classificação</span>
                <span id="hubRank" class="stat-val rank">Recruta</span>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 1.2rem 0;">

        <!-- Formulários -->
        <div class="form-group">
            <label for="usernameInput">Nome de Usuário (Nick):</label>
            <input type="text" id="usernameInput" placeholder="Digite seu nick..." maxlength="14">
        </div>

        <div class="form-group">
            <label for="genderInput">Modelo de Gênero & Neon:</label>
            <select id="genderInput" class="select-custom">
                <option value="masculino">Masculino (Neon Azul)</option>
                <option value="feminino">Feminino (Neon Rosa)</option>
            </select>
        </div>

        <button class="btn-save" id="saveBtn">Salvar Alterações</button>
        <button class="btn-clear" id="clearBtn">Excluir Conta Local</button>
    </div>

    <!-- Script de Persistência Compartilhado -->
    <script src="conta.js"></script>
    
    <script>
        const avatarInput = document.getElementById('avatarInput');
        const avatarPreview = document.getElementById('avatarPreview');
        const usernameInput = document.getElementById('usernameInput');
        const genderInput = document.getElementById('genderInput');
        const userDisplay = document.getElementById('userDisplay');
        const saveBtn = document.getElementById('saveBtn');
        const clearBtn = document.getElementById('clearBtn');
        
        // Elementos de status do Hub
        const hubBits = document.getElementById('hubBits');
        const hubRank = document.getElementById('hubRank');

        let fotoBase64Atual = "";

        // 1. Carrega dados da conta na UI
        function atualizarUI() {
            const conta = ContaSistema.carregar();
            
            userDisplay.textContent = conta.nome;
            usernameInput.value = conta.nome;
            genderInput.value = conta.gender || "masculino";
            avatarPreview.src = conta.foto;
            
            fotoBase64Atual = conta.foto;

            // Carrega dinamicamente os valores de Bits e Rank caso já existam no localStorage do Hub
            if(conta.bits !== undefined) hubBits.textContent = `${conta.bits} BT`;
            if(conta.rank !== undefined) hubRank.textContent = conta.rank;
            
            // Ajusta paleta neon dinâmica baseado na preferência de gênero
            aplicarNeonDinamico(conta.gender);
        }

        function aplicarNeonDinamico(genero) {
            if (genero === 'feminino') {
                avatarPreview.style.borderColor = '#ff007f';
                avatarPreview.style.boxShadow = '0 0 20px rgba(255, 0, 127, 0.35)';
            } else {
                avatarPreview.style.borderColor = '#00f0ff';
                avatarPreview.style.boxShadow = '0 0 20px rgba(0, 240, 255, 0.35)';
            }
        }

        window.addEventListener('DOMContentLoaded', atualizarUI);

        // 2. Processamento e Compressão Inteligente da Foto para Evitar Lag no Socket.io
        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        // Mapeamento em Canvas Invisível
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // Resolução otimizada para Avatares Multiplayer Reduzidos
                        canvas.width = 128;
                        canvas.height = 128;
                        
                        // Desenha redimensionando para um quadrado perfeito
                        ctx.drawImage(img, 0, 0, 128, 128);
                        
                        // Transforma em string de dados leve em formato JPEG
                        fotoBase64Atual = canvas.toDataURL('image/jpeg', 0.8);
                        avatarPreview.src = fotoBase64Atual;
                    };
                };
                reader.readAsDataURL(file);
            }
        });

        // Atualização reativa das cores neon ao trocar o seletor
        genderInput.addEventListener('change', (e) => {
            aplicarNeonDinamico(e.target.value);
        });

        // 3. Salva e sincroniza as atualizações
        saveBtn.addEventListener('click', () => {
            const novoNome = usernameInput.value.trim();
            const novoGenero = genderInput.value;
            
            if (novoNome === "") {
                alert("Por favor, preencha o campo de Nome de Usuário.");
                return;
            }

            // Armazena no encapsulamento local do arquivo conta.js
            ContaSistema.salvar(novoNome, novoGenero, fotoBase64Atual);
            
            userDisplay.textContent = novoNome;
            alert("Sincronização concluída! Perfil atualizado com sucesso.");
        });

        // 4. Limpeza e redefinição dos dados locais
        clearBtn.addEventListener('click', () => {
            if(confirm("Deseja apagar os dados locais desta conta? Esta ação não pode ser desfeita.")) {
                ContaSistema.limpar();
                atualizarUI();
            }
        });
    </script>
</body>
</html>
