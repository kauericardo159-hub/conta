<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta Base - Gerenciador Pro</title>
    <style>
        /* CSS Otimizado com Tema Dark / Cyberpunk Avançado */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0c0c12;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            user-select: none;
        }

        .account-card {
            background-color: #14141d;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 20px rgba(130, 87, 229, 0.1);
            text-align: center;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.25);
            background: #0c0c12;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        h2 {
            margin: 10px 0 5px 0;
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .username-display {
            font-size: 1.25rem;
            color: #04d361;
            font-weight: bold;
            margin-bottom: 1.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #00f0ff;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"], .select-custom {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: #0c0c12;
            color: #fff;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input[type="text"]:focus, .select-custom:focus {
            outline: none;
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        input[type="file"] {
            display: none;
        }

        .btn-upload {
            display: inline-block;
            padding: 6px 14px;
            background-color: #1c1c24;
            color: #a8a8b3;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .btn-upload:hover {
            background-color: #00f0ff;
            color: #0c0c12;
            font-weight: 700;
        }

        /* Seções Dinâmicas (Saves, Memórias, Sites) */
        .data-section {
            margin-top: 1.5rem;
            text-align: left;
        }

        .data-title {
            color: #8257e5;
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(130, 87, 229, 0.2);
            padding-bottom: 4px;
        }

        .data-list {
            background-color: #0c0c12;
            border-radius: 8px;
            padding: 8px;
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: #a8a8b3;
        }
        .data-item:last-child { border-bottom: none; }
        .data-item b { color: #fff; }

        /* Grade de Ações de Backup */
        .backup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 1.5rem;
        }

        .btn-action {
            padding: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-download { background-color: #04d361; color: #0c0c12; }
        .btn-download:hover { background-color: #0ef873; }

        .btn-import { background-color: #1c1c24; color: #fff; text-align: center; }
        .btn-import:hover { background-color: #29292e; border-color: #8257e5; }

        .btn-save {
            width: 100%;
            padding: 14px;
            background-color: #8257e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            margin-top: 1.5rem;
            box-shadow: 0 4px 15px rgba(130, 87, 229, 0.3);
        }

        .btn-save:hover {
            background-color: #9466ff;
            box-shadow: 0 4px 25px rgba(130, 87, 229, 0.5);
            transform: translateY(-1px);
        }

        .btn-clear {
            background: transparent;
            color: #ff4b4b;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 18px;
            cursor: pointer;
            text-decoration: underline;
            opacity: 0.7;
            transition: opacity 0.2s;
            display: inline-block;
            width: 100%;
            text-align: center;
        }
        .btn-clear:hover { opacity: 1; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #29292e; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8257e5; }
    </style>
</head>
<body>

    <div class="account-card">
        <div class="avatar-container">
            <img id="avatarPreview" class="avatar-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Avatar do Usuário">
            <label for="avatarInput" class="btn-upload">Alterar Foto</label>
            <input type="file" id="avatarInput" accept="image/*">
        </div>

        <h2 id="welcomeTitle">Olá!</h2>
        <div id="userDisplay" class="username-display">Jogador_Novo</div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 1.5rem 0;">

        <div class="form-group">
            <label for="usernameInput">Nome de Usuário:</label>
            <input type="text" id="usernameInput" placeholder="Digite seu nick...">
        </div>

        <div class="form-group">
            <label for="genderInput">Modelo de Gênero:</label>
            <select id="genderInput" class="select-custom">
                <option value="masculino">Masculino (Neon Azul)</option>
                <option value="feminino">Feminino (Neon Rosa)</option>
            </select>
        </div>

        <div class="data-section">
            <div class="data-title">💾 Lista de Saves / Progresso</div>
            <div class="data-list" id="savesContainer"></div>
        </div>

        <div class="data-section">
            <div class="data-title">🧠 Memórias Expandidas</div>
            <div class="data-list" id="memoriasContainer"></div>
        </div>

        <div class="data-section">
            <div class="data-title">🌐 Sites & Conexões</div>
            <div class="data-list" id="sitesContainer"></div>
        </div>

        <div class="backup-grid">
            <button class="btn-action btn-download" id="downloadAccountBtn">⬇️ Baixar Conta</button>
            <label for="importAccountInput" class="btn-action btn-import">⬆️ Importar JSON</label>
            <input type="file" id="importAccountInput" accept=".json">
        </div>

        <button class="btn-save" id="saveBtn">Salvar Alterações</button>
        <button class="btn-clear" id="clearBtn">Excluir Conta Local</button>
    </div>

    <script src="conta.js"></script>
    
    <script>
        const avatarInput = document.getElementById('avatarInput');
        const avatarPreview = document.getElementById('avatarPreview');
        const usernameInput = document.getElementById('usernameInput');
        const genderInput = document.getElementById('genderInput');
        const userDisplay = document.getElementById('userDisplay');
        const welcomeTitle = document.getElementById('welcomeTitle');
        const saveBtn = document.getElementById('saveBtn');
        const clearBtn = document.getElementById('clearBtn');
        
        const downloadAccountBtn = document.getElementById('downloadAccountBtn');
        const importAccountInput = document.getElementById('importAccountInput');

        let fotoBase64Atual = "";

        // 1. Carrega dados estruturados da conta e injeta nas listas do DOM
        function atualizarUI() {
            const conta = ContaSistema.carregar();
            
            userDisplay.textContent = conta.nome;
            usernameInput.value = conta.nome;
            genderInput.value = conta.gender || "masculino";
            avatarPreview.src = conta.foto;
            fotoBase64Atual = conta.foto;
            welcomeTitle.textContent = `Olá, ${conta.nome}!`;
            
            // Controle dinâmico de cores de acordo com o gênero selecionado
            const corNeon = (conta.gender === 'feminino') ? '#ff007f' : '#00f0ff';
            const shadowNeon = (conta.gender === 'feminino') ? '0 0 20px rgba(255, 0, 127, 0.25)' : '0 0 20px rgba(0, 240, 255, 0.25)';
            
            avatarPreview.style.borderColor = corNeon;
            avatarPreview.style.boxShadow = shadowNeon;

            // Renderiza as Listas Dinâmicas controladas pelo core (conta.js)
            renderizarLista('savesContainer', conta.saves, 'Nenhum save registrado.');
            renderizarLista('memoriasContainer', conta.memorias, 'Sem memórias no histórico.');
            renderizarLista('sitesContainer', conta.sites, 'Nenhum site conectado.');
        }

        function renderizarLista(containerId, dados, mensagemVazia) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            
            if (!dados || Object.keys(dados).length === 0) {
                container.innerHTML = `<div style="color:#7c7c8a; text-align:center; padding: 10px; font-size:0.8rem;">${mensagemVazia}</div>`;
                return;
            }

            Object.entries(dados).forEach(([chave, valor]) => {
                const item = document.createElement('div');
                item.className = 'data-item';
                item.innerHTML = `<span>${chave}</span>: <b>${valor}</b>`;
                container.appendChild(item);
            });
        }

        window.addEventListener('DOMContentLoaded', atualizarUI);

        // 2. Compressão Inteligente de Imagem (128x128 JPEG) para economizar LocalStorage
        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 128;
                        canvas.height = 128;
                        ctx.drawImage(img, 0, 0, 128, 128);
                        fotoBase64Atual = canvas.toDataURL('image/jpeg', 0.8);
                        avatarPreview.src = fotoBase64Atual;
                    };
                };
                reader.readAsDataURL(file);
            }
        });

        // Efeito visual imediato ao alternar o seletor de gênero antes de salvar
        genderInput.addEventListener('change', (e) => {
            avatarPreview.style.borderColor = (e.target.value === 'feminino') ? '#ff007f' : '#00f0ff';
            avatarPreview.style.boxShadow = (e.target.value === 'feminino') ? '0 0 20px rgba(255, 0, 127, 0.25)' : '0 0 20px rgba(0, 240, 255, 0.25)';
        });

        // 3. Salva Alterações Principais no core do conta.js
        saveBtn.addEventListener('click', () => {
            const novoNome = usernameInput.value.trim();
            const novoGenero = genderInput.value;
            
            if (novoNome === "") {
                alert("Por favor, insira um nome válido.");
                return;
            }

            if (typeof ContaSistema.salvarDadosBase === "function") {
                ContaSistema.salvarDadosBase(novoNome, novoGenero, fotoBase64Atual);
            } else {
                // Fallback de segurança se a função não estiver explícita no conta.js
                const conta = ContaSistema.carregar();
                conta.nome = novoNome;
                conta.gender = novoGenero;
                conta.foto = fotoBase64Atual;
                localStorage.setItem(ContaSistema.STORAGE_KEY, JSON.stringify(conta));
            }

            atualizarUI();
            alert("Alterações e metadados sincronizados com sucesso!");
        });

        // 4. Mecanismo de Importação e Exportação (JSON)
        downloadAccountBtn.addEventListener('click', () => {
            if (typeof ContaSistema.exportarConta === "function") {
                ContaSistema.exportarConta();
            } else {
                const conta = ContaSistema.carregar();
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(conta, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `${conta.nome}_backup.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
            }
        });

        importAccountInput.addEventListener('change', (e) => {
            const arquivo = e.target.files[0];
            if (arquivo) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    let sucesso = false;
                    if (typeof ContaSistema.importarConta === "function") {
                        sucesso = ContaSistema.importarConta(event.target.result);
                    } else {
                        try {
                            const dados = JSON.parse(event.target.result);
                            localStorage.setItem(ContaSistema.STORAGE_KEY, JSON.stringify(dados));
                            sucesso = true;
                        } catch (err) {
                            alert("Arquivo JSON inválido!");
                        }
                    }
                    if (sucesso) {
                        atualizarUI();
                        alert("Conta importada e sincronizada com sucesso!");
                    }
                };
                reader.readAsText(arquivo);
            }
        });

        clearBtn.addEventListener('click', () => {
            if(confirm("Tem certeza que deseja limpar todos os registros locais de sua conta? Esta ação é irreversível.")) {
                ContaSistema.limpar();
                atualizarUI();
            }
        });
    </script>
</body>
</html>
