<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta Base - Gerenciador Pro</title>
    <style>
        /* CSS Otimizado com Tema Dark / Cyberpunk */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0c0c12;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        .account-card {
            background-color: #14141d;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 20px rgba(130, 87, 229, 0.1);
            text-align: center;
            width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 1.5rem;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.25);
            background: #0c0c12;
            transition: border-color 0.3s;
        }

        h2 {
            margin: 10px 0 5px 0;
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .username-display {
            font-size: 1.25rem;
            color: #04d361;
            font-weight: bold;
            margin-bottom: 1.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #00f0ff;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"], .select-custom {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: #0c0c12;
            color: #fff;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input[type="text"]:focus, .select-custom:focus {
            outline: none;
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        input[type="file"] {
            display: none;
        }

        .btn-upload {
            display: inline-block;
            padding: 6px 14px;
            background-color: #1c1c24;
            color: #a8a8b3;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .btn-upload:hover {
            background-color: #00f0ff;
            color: #0c0c12;
            font-weight: 700;
        }

        .btn-save {
            width: 100%;
            padding: 14px;
            background-color: #8257e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(130, 87, 229, 0.3);
        }

        .btn-save:hover {
            background-color: #9466ff;
            box-shadow: 0 4px 25px rgba(130, 87, 229, 0.5);
            transform: translateY(-1px);
        }

        .btn-clear {
            background: transparent;
            color: #ff4b4b;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 18px;
            cursor: pointer;
            text-decoration: underline;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .btn-clear:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="account-card">
        <div class="avatar-container">
            <img id="avatarPreview" class="avatar-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Avatar do Usuário">
            <label for="avatarInput" class="btn-upload">Alterar Foto</label>
            <input type="file" id="avatarInput" accept="image/*">
        </div>

        <h2 id="welcomeTitle">Olá!</h2>
        <div id="userDisplay" class="username-display">Jogador_Novo</div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 1.5rem 0;">

        <div class="form-group">
            <label for="usernameInput">Nome de Usuário:</label>
            <input type="text" id="usernameInput" placeholder="Digite seu nick...">
        </div>

        <div class="form-group">
            <label for="genderInput">Modelo de Gênero:</label>
            <select id="genderInput" class="select-custom">
                <option value="masculino">Masculino (Neon Azul)</option>
                <option value="feminino">Feminino (Neon Rosa)</option>
            </select>
        </div>

        <button class="btn-save" id="saveBtn">Salvar Alterações</button>
        <button class="btn-clear" id="clearBtn">Excluir Conta Local</button>
    </div>

    <script src="conta.js"></script>
    
    <script>
        const avatarInput = document.getElementById('avatarInput');
        const avatarPreview = document.getElementById('avatarPreview');
        const usernameInput = document.getElementById('usernameInput');
        const genderInput = document.getElementById('genderInput');
        const userDisplay = document.getElementById('userDisplay');
        const saveBtn = document.getElementById('saveBtn');
        const clearBtn = document.getElementById('clearBtn');

        let fotoBase64Atual = "";

        // 1. Carrega dados da conta na UI
        function atualizarUI() {
            const conta = ContaSistema.carregar();
            
            userDisplay.textContent = conta.nome;
            usernameInput.value = conta.nome;
            genderInput.value = conta.gender || "masculino";
            avatarPreview.src = conta.foto;
            
            fotoBase64Atual = conta.foto;
            
            // Muda a borda neon dependendo do gênero para um charme visual extra
            avatarPreview.style.borderColor = (conta.gender === 'feminino') ? '#ff007f' : '#00f0ff';
            avatarPreview.style.boxShadow = (conta.gender === 'feminino') ? '0 0 20px rgba(255, 0, 127, 0.25)' : '0 0 20px rgba(0, 240, 255, 0.25)';
        }

        window.addEventListener('DOMContentLoaded', atualizarUI);

        // 2. Transforma a foto em Base64 COMPRIMIDO e LEVE (Evita lag no Socket.io)
        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        // ⚡ COMPRESSÃO VIA CANVAS INVISÍVEL
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // Força a imagem a virar um quadrado perfeito e leve de 128x128 pixels
                        canvas.width = 128;
                        canvas.height = 128;
                        
                        // Desenha redimensionando com algoritmos do navegador
                        ctx.drawImage(img, 0, 0, 128, 128);
                        
                        // Exporta como JPEG de alta performance (Qualidade 0.8)
                        fotoBase64Atual = canvas.toDataURL('image/jpeg', 0.8);
                        avatarPreview.src = fotoBase64Atual;
                    };
                };
                reader.readAsDataURL(file);
            }
        });

        // Mudar borda neon em tempo real na alteração do select
        genderInput.addEventListener('change', (e) => {
            avatarPreview.style.borderColor = (e.target.value === 'feminino') ? '#ff007f' : '#00f0ff';
            avatarPreview.style.boxShadow = (e.target.value === 'feminino') ? '0 0 20px rgba(255, 0, 127, 0.25)' : '0 0 20px rgba(0, 240, 255, 0.25)';
        });

        // 3. Salva usando a nova lógica estendida do conta.js
        saveBtn.addEventListener('click', () => {
            const novoNome = usernameInput.value.trim();
            const novoGenero = genderInput.value;
            
            if (novoNome === "") {
                alert("Por favor, insira um nome válido.");
                return;
            }

            // Envia o nome, gênero e a string comprimida leve
            ContaSistema.salvar(novoNome, novoGenero, fotoBase64Atual);
            
            userDisplay.textContent = novoNome;
            alert("Alterações salvas com sucesso no perfil global!");
        });

        // 4. Botão de limpeza
        clearBtn.addEventListener('click', () => {
            if(confirm("Tem certeza que deseja limpar os dados da sua conta?")) {
                ContaSistema.limpar();
                atualizarUI();
            }
        });
    </script>
</body>
</html>
